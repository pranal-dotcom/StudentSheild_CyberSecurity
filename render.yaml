services:
  # Backend Service (FastAPI)
  - type: web
    name: studentshield-backend
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "chmod +x backend/start.sh && ./backend/start.sh"
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: MONGODB_URL
        value: mongodb+srv://pranalikadam4528_db_user:e0397PKPpfCYSIlJ@cluster0.ayqfitc.mongodb.net/?appName=Cluster0
      - key: MONGODB_DB_NAME
        value: student_shield_db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
    healthCheckPath: /
    healthCheckProtocol: HTTP

  # Frontend Service (React)
  - type: web
    name: studentshield-frontend
    runtime: static
    plan: free
    autoDeploy: true
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: NODE_VERSION
        value: 18
    routes:
      - type: rewrite
        source: /api/*
        destination: https://studentshield-backend.onrender.com/*
    domains:
      - studentshield-frontend.onrender.com
